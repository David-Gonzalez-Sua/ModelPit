<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelPit - AI Agent Battles</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .code { font-family: 'Fira Code', monospace; }
        .message-feed { height: 400px; overflow-y: auto; }
        .game-board { font-family: 'Fira Code', monospace; white-space: pre; background: #1e293b; padding: 1rem; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MODELS = ["chatgpt", "claude", "gemini", "deepseek", "kimi", "ollama", "human"];
        const GEMINI_MODELS = ["gemini-2.0-flash", "gemini-1.5-flash", "gemini-1.5-pro", "gemini-1.0-pro"];
        const GAMES = [
            { id: "word_guessing", name: "Word Guessing (Social Engineering)" },
            { id: "tictactoe", name: "Tic Tac Toe" },
            { id: "rockpapsci", name: "Rock Paper Scissors" }
        ];


        const TicTacToeBoard = ({ state, finished, winner }) => {
            const rows = state.split('\n').slice(1).map(row => row.trim().split(' ').slice(1));
            return (
                <div className="grid grid-cols-3 gap-2 w-48 h-48 mx-auto">
                    {rows.flat().map((cell, i) => (
                        <div key={i} className="bg-slate-700 border border-slate-600 rounded flex items-center justify-center text-3xl font-bold">
                            {cell === 'X' && <span className="text-blue-500">X</span>}
                            {cell === 'O' && <span className="text-purple-500">O</span>}
                        </div>
                    ))}
                </div>
            );
        };
    
        const RockPaperScissorsBoard = ({ state }) => {
            const getIcon = (move) => {
                if (move === 'rock') return '🪨';
                if (move === 'paper') return '📄';
                if (move === 'scissors') return '✂️';
                return '❓';
            };
            
            const lines = state.split('\n');
            const p1Moved = lines[0].includes('Moved');
            const p2Moved = lines[1].includes('Moved');
            const resultMatch = state.match(/Result: (\w+) vs (\w+)/);
            
            const m1 = resultMatch ? resultMatch[1] : (p1Moved ? 'ready' : null);
            const m2 = resultMatch ? resultMatch[2] : (p2Moved ? 'ready' : null);

            return (
                <div className="flex justify-around items-center w-full h-32">
                    <div className="flex flex-col items-center">
                        <div className="text-4xl mb-2">{m1 === 'ready' ? '🧠' : getIcon(m1)}</div>
                        <div className="text-xs text-slate-400">Agent 1</div>
                    </div>
                    <div className="text-2xl font-bold text-slate-500 font-mono">VS</div>
                    <div className="flex flex-col items-center">
                        <div className="text-4xl mb-2">{m2 === 'ready' ? '🧠' : getIcon(m2)}</div>
                        <div className="text-xs text-slate-400">Agent 2</div>
                    </div>
                </div>
            );
        };
    
        const WordGuessingArena = ({ messages, resources, secretWord }) => {
            const arenaMessagesEndRef = useRef(null);
            
            useEffect(() => {
                arenaMessagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            return (
                <div className="relative w-full flex flex-col h-[400px] bg-slate-900/50 rounded-xl overflow-hidden border border-slate-700 shadow-2xl">
                    <div className="bg-slate-800/90 p-3 border-b border-slate-700 flex justify-between items-center z-30">
                        <div className="flex items-center space-x-4">
                            <span className="text-xs font-bold text-blue-400 uppercase tracking-widest">Attacker</span>
                            <span className="text-slate-600 font-bold italic">VS</span>
                            <span className="text-xs font-bold text-purple-400 uppercase tracking-widest">Defender</span>
                        </div>
                        <div className="bg-slate-900 px-2 py-1 rounded border border-slate-600">
                            <span className="text-[10px] text-slate-500 uppercase mr-2 font-bold">Secret Word:</span>
                            <span className="text-xs font-mono font-bold text-yellow-500">{secretWord || "???"}</span>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-900/10 custom-scrollbar">
                        {messages.length === 0 && (
                            <div className="h-full flex items-center justify-center text-slate-500 italic text-sm">
                                Waiting for battle to begin...
                            </div>
                        )}
                        {messages.map((msg, idx) => {
                            const isAtk = msg.role === "attacker" || msg.role.includes("1");
                            return (
                                <div key={idx} className={"flex " + (isAtk ? "justify-start" : "justify-end")}>
                                    <div className={"max-w-[85%] rounded-xl p-3 shadow-md " + (
                                        isAtk 
                                        ? "bg-blue-600/10 border border-blue-500/20 text-blue-50" 
                                        : "bg-purple-600/10 border border-purple-500/20 text-purple-50"
                                    )}>
                                        <div className={"text-[9px] font-black uppercase tracking-widest mb-1 opacity-40 " + (isAtk ? "text-blue-400" : "text-purple-400 text-right")}>
                                            {msg.role}
                                        </div>
                                        <div className={"text-xs leading-relaxed " + (!isAtk ? "text-right" : "")}>{msg.text}</div>
                                    </div>
                                </div>
                            );
                        })}
                        <div ref={arenaMessagesEndRef} />
                    </div>

                    <div className="p-3 bg-slate-800/80 border-t border-slate-700">
                        <div className="flex justify-between items-center mb-1.5">
                            <span className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Attacker Resources</span>
                            <span className={"text-xs font-mono font-bold " + (resources > 30 ? "text-slate-300" : "text-red-500 animate-pulse")}>{resources}%</span>
                        </div>
                        <div className="w-full bg-slate-900 rounded-full h-2 border border-slate-700 p-0.5">
                            <div 
                                className={"h-full rounded-full transition-all duration-700 ease-out " + (
                                    resources > 60 ? "bg-blue-500" : 
                                    resources > 25 ? "bg-yellow-500" : 
                                    "bg-red-500"
                                )}
                                style={{ width: resources + "%" }}
                            ></div>
                        </div>
                    </div>
                    <style>{`
                        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
                    `}</style>
                </div>
            );
        };
    
        function App() {
            const [agent1, setAgent1] = useState("chatgpt");
            const [agent2, setAgent2] = useState("gemini");
            const [ollamaModels, setOllamaModels] = useState([]);
            const [geminiModels, setGeminiModels] = useState([]);
            const [agent1SubModel, setAgent1SubModel] = useState("");
            const [agent2SubModel, setAgent2SubModel] = useState("");
            const [gameMode, setGameMode] = useState("word_guessing");
            const [battleId, setBattleId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [gameState, setGameState] = useState("");
            const [finished, setFinished] = useState(false);
            const [winner, setWinner] = useState(null);
            const [loading, setLoading] = useState(false);
            const [autoPlay, setAutoPlay] = useState(false);
            const [resources, setResources] = useState(100);
            const [showLiveFeed, setShowLiveFeed] = useState(true);
            const [secretWord, setSecretWord] = useState("");
            
            
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                const fetchOllamaModels = async () => {
                    try {
                        const res = await fetch("/api/ollama/models");
                        const data = await res.json();
                        setOllamaModels(data.models || []);
                        if (data.models && data.models.length > 0) {
                            setAgent1SubModel(data.models[0]);
                            setAgent2SubModel(data.models[0]);
                        }
                    } catch (err) {
                        console.error("Failed to fetch Ollama models", err);
                    }
                };
                fetchOllamaModels();

                const fetchGeminiModels = async () => {
                    try {
                        const res = await fetch("/api/gemini/models");
                        const data = await res.json();
                        setGeminiModels(data.models || []);
                    } catch (err) {
                        console.error("Failed to fetch Gemini models", err);
                    }
                };
                fetchGeminiModels();
            }, []);

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            useEffect(() => {
                if (agent1 === "gemini") {
                    if (geminiModels.length > 0 && !geminiModels.includes(agent1SubModel)) {
                        setAgent1SubModel(geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]));
                    }
                } else if (agent1 === "ollama") {
                    if (ollamaModels.length > 0 && !ollamaModels.includes(agent1SubModel)) {
                        setAgent1SubModel(ollamaModels[0]);
                    }
                }
            }, [agent1, geminiModels, ollamaModels]);

            useEffect(() => {
                if (agent2 === "gemini") {
                    if (geminiModels.length > 0 && !geminiModels.includes(agent2SubModel)) {
                        setAgent2SubModel(geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]));
                    }
                } else if (agent2 === "ollama") {
                    if (ollamaModels.length > 0 && !ollamaModels.includes(agent2SubModel)) {
                        setAgent2SubModel(ollamaModels[0]);
                    }
                }
            }, [agent2, geminiModels, ollamaModels]);

            useEffect(() => {
                let interval;
                if (autoPlay && battleId && !finished) {
                    interval = setInterval(() => {
                        takeTurn();
                    }, 2000);
                }
                return () => clearInterval(interval);
            }, [autoPlay, battleId, finished]);

            
            const resetUI = () => {
                setBattleId(null);
                setMessages([]);
                setGameState("");
                setFinished(false);
                setWinner(null);
                setResources(100);
                setSecretWord("");
                setAutoPlay(false);
            };
    
            const startBattle = async () => {
                setLoading(true);
                
                setMessages([]);
                setGameState("");
                setFinished(false);
                setWinner(null);
                try {
                    const res = await fetch("/api/battle/start", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            attacker: agent1,
                            attackerSubModel: (agent1 === "ollama" || agent1 === "gemini") ? agent1SubModel : null,
                            defender: agent2,
                            defenderSubModel: (agent2 === "ollama" || agent2 === "gemini") ? agent2SubModel : null,
                            playMode: "ai_vs_ai",
                            gameMode: gameMode
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Failed to start battle");
                    setBattleId(data.battleId);
                    if (data.secretWord) setSecretWord(data.secretWord);
                } catch (err) {
                    console.error("Error starting battle: ", err.message);
                }
                setLoading(false);
            };

            const stopBattle = async () => {
                if (!battleId) return;
                try {
                    const res = await fetch(`/api/battle/stop?battle_id=${battleId}`, {
                        method: "POST"
                    });
                    const data = await res.json();
                    if (data.status === "stopped") {
                        setFinished(true);
                        setWinner("stopped");
                        setAutoPlay(false);
                    }
                } catch (err) {
                    console.error("Error stopping battle:", err);
                }
            };


            const takeTurn = async () => {
                if (!battleId || finished || loading) return;
                setLoading(true);
                
                try {
                    const res = await fetch(`/api/battle/turn?battle_id=${battleId}`, {
                        method: "POST"
                    });
                    const data = await res.json();
                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // For word guessing, we sometimes get both Attacker and Defender messages in one call.
                    // We'll show the Attacker's message immediately, then the Defender's after a short delay for realism.
                    if (gameMode === 'word_guessing' && data.messages.length > messages.length + 1) {
                        const allMessages = data.messages;
                        const attackerMessage = allMessages[allMessages.length - 2];
                        const defenderMessage = allMessages[allMessages.length - 1];
                        
                        // 1. Show only up to Attacker's message
                        setMessages(allMessages.slice(0, -1));
                        
                        // 2. Wait 800ms, then show Defender's response
                        setTimeout(() => {
                            setMessages(allMessages);
                            setGameState(data.state || "");
                            setFinished(data.finished);
                            setWinner(data.winner);
                            setResources(data.resources);
                            if (data.secretWord) setSecretWord(data.secretWord);
                        }, 800);
                    } else {
                        setMessages(data.messages || []);
                        setGameState(data.state || "");
                        setFinished(data.finished);
                        setWinner(data.winner);
                        setResources(data.resources);
                        if (data.secretWord) setSecretWord(data.secretWord);
                    }
                } catch (err) {
                    console.error("Error taking turn:", err);
                    setAutoPlay(false);
                }
                setLoading(false);
            };

            return (
                <div className="container mx-auto px-4 py-8 max-w-5xl">
                    <header className="mb-8 text-center">
                        <h1 className="text-4xl font-bold text-blue-400 mb-2">ModelPit</h1>
                        <p className="text-slate-400">Watch LLMs challenge each other in games of logic and wit.</p>
                    </header>

                    

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Setup Panel */}
                        <div className="bg-slate-800 p-6 rounded-xl shadow-lg h-fit">
                            <h2 className="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Battle Configuration</h2>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-400 mb-1">Agent 1 (Attacker/X)</label>
                                    <select 
                                        value={agent1} 
                                        onChange={(e) => { setAgent1(e.target.value); resetUI(); }}
                                        disabled={battleId && !finished}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        {MODELS.map(m => <option key={m} value={m}>{m.toUpperCase()}</option>)}
                                    </select>
                                    {agent1 === 'ollama' && (
                                        <select 
                                            value={agent1SubModel} 
                                            onChange={(e) => { setAgent1SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {ollamaModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {ollamaModels.length === 0 && <option value="">No Ollama Models Found</option>}
                                        </select>
                                    )}
                                    {agent1 === 'gemini' && (
                                        <select 
                                            value={agent1SubModel || (geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]))} 
                                            onChange={(e) => { setAgent1SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {geminiModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {geminiModels.length === 0 && <option value="">No Gemini Models Found</option>}
                                        </select>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-400 mb-1">Agent 2 (Defender/O)</label>
                                    <select 
                                        value={agent2} 
                                        onChange={(e) => { setAgent2(e.target.value); resetUI(); }}
                                        disabled={battleId && !finished}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        {MODELS.map(m => <option key={m} value={m}>{m.toUpperCase()}</option>)}
                                    </select>
                                    {agent2 === 'ollama' && (
                                        <select 
                                            value={agent2SubModel} 
                                            onChange={(e) => { setAgent2SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {ollamaModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {ollamaModels.length === 0 && <option value="">No Ollama Models Found</option>}
                                        </select>
                                    )}
                                    {agent2 === 'gemini' && (
                                        <select 
                                            value={agent2SubModel || (geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]))} 
                                            onChange={(e) => { setAgent2SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {geminiModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {geminiModels.length === 0 && <option value="">No Gemini Models Found</option>}
                                        </select>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-slate-400 mb-1">Game</label>
                                    <select 
                                        value={gameMode} 
                                        onChange={(e) => { setGameMode(e.target.value); resetUI(); }}
                                        disabled={battleId && !finished}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    >
                                        {GAMES.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                    </select>
                                </div>

                                <button 
                                    onClick={startBattle}
                                    disabled={loading || (battleId && !finished)}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-600 text-white font-bold py-2 px-4 rounded-md transition duration-200 mt-4"
                                >
                                    Initialize Battle
                                </button>
                            </div>

                            {battleId && (
                                <div className="mt-8 space-y-4">
                                    <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider">Controls</h3>
                                    <div className="flex space-x-2">
                                        <button 
                                            onClick={takeTurn}
                                            disabled={loading || finished}
                                            className="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-slate-600 text-white py-2 px-2 rounded-md transition duration-200 text-sm"
                                        >
                                            Next Turn
                                        </button>
                                        <button 
                                            onClick={() => setAutoPlay(!autoPlay)}
                                            className={`flex-1 ${autoPlay ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white py-2 px-2 rounded-md transition duration-200 text-sm`}
                                        >
                                            {autoPlay ? 'Stop Auto' : 'Auto Play'}
                                        </button>

                                        <button 
                                            onClick={stopBattle}
                                            disabled={finished}
                                            className="flex-1 bg-gray-600 hover:bg-gray-700 disabled:bg-slate-700 text-white py-2 px-2 rounded-md transition duration-200 text-sm"
                                        >
                                            Stop Match
                                        </button>
                                    </div>
                                    {gameMode === 'word_guessing' && (
                                        <div className="mt-4">
                                            <div className="text-xs text-slate-400 mb-1">Attacker Resources</div>
                                            <div className="w-full bg-slate-700 rounded-full h-2">
                                                <div 
                                                    className="bg-red-500 h-2 rounded-full transition-all duration-500" 
                                                    style={{ width: `${resources}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Battle Area */}
                        <div className="lg:col-span-2 space-y-6">
                            {/* Game State Visualization */}
                            <div className="bg-slate-800 p-6 rounded-xl shadow-lg">
                                <h2 className="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Arena</h2>
                                {gameState ? (
                                    <div className="flex flex-col items-center">
                                        <div className="mb-4 w-full">
                                            {gameMode === 'tictactoe' && <TicTacToeBoard state={gameState} finished={finished} winner={winner} />}
                                            {gameMode === 'rockpapsci' && <RockPaperScissorsBoard state={gameState} />}
                                            {gameMode === 'word_guessing' && <WordGuessingArena messages={messages} resources={resources} secretWord={secretWord} />}
                                            {(!['tictactoe', 'rockpapsci', 'word_guessing'].includes(gameMode)) && (
                                                <div className="game-board text-center">{gameState}</div>
                                            )}
                                        </div>
                                        {finished && (
                                            <div className="text-2xl font-bold text-yellow-400 animate-bounce">
                                                {winner === 'draw' ? 'DRAW!' : `WINNER: ${winner.toUpperCase()}!`}
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="h-48 flex items-center justify-center text-slate-500 italic">
                                        Waiting for battle to begin...
                                    </div>
                                )}
                            </div>

                            {/* Live Feed */}
                            <div className="bg-slate-800 p-6 rounded-xl shadow-lg flex flex-col">
                                <div 
                                    className="flex justify-between items-center mb-4 border-b border-slate-700 pb-2 cursor-pointer hover:bg-slate-700/30 transition-colors p-2 rounded-t-lg"
                                    onClick={() => setShowLiveFeed(!showLiveFeed)}
                                >
                                    <h2 className="text-xl font-semibold">Live Feed {messages.length > 0 && `(${messages.length})`}</h2>
                                    <span className="text-slate-400 text-sm">
                                        {showLiveFeed ? '▼ Hide' : '▶ Expand'}
                                    </span>
                                </div>
                                {showLiveFeed && (
                                    <div className="message-feed space-y-4 pr-2">
                                        {messages.length === 0 && (
                                            <div className="text-slate-500 italic text-center py-8">No messages yet...</div>
                                        )}
                                        {messages.map((msg, idx) => (
                                            <div key={idx} className={`p-3 rounded-lg ${msg.role.includes('1') || msg.role === 'attacker' ? 'bg-blue-900/40 ml-0 mr-8 border-l-4 border-blue-500' : 'bg-purple-900/40 ml-8 mr-0 border-r-4 border-purple-500 text-right'}`}>
                                                <div className="text-xs font-bold text-slate-400 uppercase mb-1">{msg.role}</div>
                                                <div className="text-sm mb-2">{msg.text}</div>
                                                {msg.analysis && (
                                                    <details className="mt-2">
                                                        <summary className="text-[10px] cursor-pointer text-slate-500 hover:text-slate-300 uppercase">Thought Process</summary>
                                                        <div className="text-[10px] mt-1 text-slate-400 bg-black/30 p-2 rounded italic">
                                                            {msg.analysis}
                                                        </div>
                                                    </details>
                                                )}
                                            </div>
                                        ))}
                                        <div ref={messagesEndRef} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
