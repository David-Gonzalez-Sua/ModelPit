<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelPit - AI Agent Battles</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #f8fafc;
            background-image: radial-gradient(circle at 50% 0%, #3a0000 0%, #050505 50%);
            min-height: 100vh;
        }

        .code {
            font-family: 'Fira Code', monospace;
        }

        .message-feed {
            height: 400px;
            overflow-y: auto;
        }

        .game-board {
            font-family: 'Fira Code', monospace;
            white-space: pre;
            background: #111;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #450a0a; /* border-red-950 */
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MODELS = ["chatgpt", "claude", "gemini", "deepseek", "kimi", "ollama", "human"];
        const GEMINI_MODELS = ["gemini-2.0-flash", "gemini-1.5-flash", "gemini-1.5-pro", "gemini-1.0-pro"];
        const GAMES = [
            { id: "word_guessing", name: "Word Guessing (Social Engineering)" },
            { id: "tictactoe", name: "Tic Tac Toe" },
            { id: "rockpapsci", name: "Rock Paper Scissors" }
        ];


        const TicTacToeBoard = ({ state, finished, winner }) => {
            const rows = state.split('\n').slice(1).map(row => row.trim().split(' ').slice(1));
            return (
                <div className="grid grid-cols-3 gap-2 w-48 h-48 mx-auto">
                    {rows.flat().map((cell, i) => (
                        <div key={i} className="bg-neutral-900 border border-red-900/50 rounded flex items-center justify-center text-3xl font-bold shadow-inner">
                            {cell === 'X' && <span className="text-red-600">X</span>}
                            {cell === 'O' && <span className="text-neutral-500">O</span>}
                        </div>
                    ))}
                </div>
            );
        };

        const RockPaperScissorsBoard = ({ state }) => {
            const getIcon = (move) => {
                if (move === 'rock') return '🪨';
                if (move === 'paper') return '📄';
                if (move === 'scissors') return '✂️';
                return '❓';
            };

            const lines = state.split('\n');
            const p1Moved = lines[0].includes('Moved');
            const p2Moved = lines[1].includes('Moved');
            const resultMatch = state.match(/Result: (\w+) vs (\w+)/);

            const m1 = resultMatch ? resultMatch[1] : (p1Moved ? 'ready' : null);
            const m2 = resultMatch ? resultMatch[2] : (p2Moved ? 'ready' : null);

            return (
                <div className="flex justify-around items-center w-full h-32">
                    <div className="flex flex-col items-center">
                        <div className="text-4xl mb-2">{m1 === 'ready' ? '🧠' : getIcon(m1)}</div>
                        <div className="text-xs text-slate-400">Agent 1</div>
                    </div>
                    <div className="text-2xl font-bold text-slate-500 font-mono">VS</div>
                    <div className="flex flex-col items-center">
                        <div className="text-4xl mb-2">{m2 === 'ready' ? '🧠' : getIcon(m2)}</div>
                        <div className="text-xs text-slate-400">Agent 2</div>
                    </div>
                </div>
            );
        };

        const getModelIcon = (model) => {
            switch (model?.toLowerCase()) {
                case 'chatgpt': return '🤖';
                case 'claude': return '🧠';
                case 'gemini': return '✨';
                case 'deepseek': return '🐳';
                case 'kimi': return '🌙';
                case 'ollama': return '🦙';
                case 'human': return '👤';
                default: return '👾';
            }
        };

        const WordGuessingArena = ({ messages, resources, secretWord, agent1, agent2 }) => {
            const [animatingMsg, setAnimatingMsg] = useState(null);

            useEffect(() => {
                if (messages.length > 0) {
                    const lastMsg = messages[messages.length - 1];
                    setAnimatingMsg(lastMsg);
                    const timer = setTimeout(() => {
                        setAnimatingMsg(null);
                    }, 1800);
                    return () => clearTimeout(timer);
                } else {
                    setAnimatingMsg(null);
                }
            }, [messages]);

            const isAttackerMsg = (msg) => msg?.role === "attacker" || msg?.role?.includes("1");

            return (
                <div className="relative w-full flex flex-col h-[400px] bg-black/80 rounded-xl overflow-hidden border border-red-900 shadow-[0_0_25px_rgba(220,38,38,0.15)]">
                    <div className="bg-neutral-900 p-3 border-b border-red-900 flex justify-between items-center z-30 shadow-md">
                        <div className="flex items-center space-x-4">
                            <span className="text-xs font-black text-red-500 uppercase tracking-widest px-2 py-0.5 bg-red-950/50 rounded border border-red-900/50">Attacker</span>
                            <span className="text-neutral-600 font-bold italic">VS</span>
                            <span className="text-xs font-black text-neutral-400 uppercase tracking-widest px-2 py-0.5 bg-neutral-800 rounded border border-neutral-700">Defender</span>
                        </div>
                        <div className="bg-black px-2 py-1 rounded border border-red-900/50">
                            <span className="text-[10px] text-red-600 uppercase mr-2 font-bold">Secret Word:</span>
                            <span className="text-xs font-mono font-bold text-red-400 tracking-wider shadow-red-500 drop-shadow-sm">{secretWord || "???"}</span>
                        </div>
                    </div>

                    <div className="flex-1 relative flex items-center justify-between px-16 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-repeat overflow-hidden before:absolute before:inset-0 before:bg-gradient-to-b before:from-transparent before:to-black/80">
                        {/* Agent 1 (Attacker) */}
                        <div className="flex flex-col items-center z-10 w-24 mt-4">
                            <div className="text-6xl mb-2 drop-shadow-[0_0_20px_rgba(220,38,38,0.7)] hover:scale-110 transition-transform duration-300">{getModelIcon(agent1)}</div>
                            <div className="text-[10px] font-black text-red-400 bg-red-950/80 px-2 py-1 rounded border border-red-600/50 uppercase tracking-widest w-full text-center truncate">{agent1 || "Agent 1"}</div>
                        </div>

                        {/* Animating Message */}
                        {animatingMsg && (
                            <div
                                key={messages.length} // Force re-animation when a new message arrives
                                className={"absolute top-1/2 -translate-y-1/2 max-w-[200px] p-3 rounded-md shadow-[0_0_15px_rgba(0,0,0,0.9)] border-l-4 text-xs z-20 overflow-hidden text-ellipsis " +
                                    (isAttackerMsg(animatingMsg)
                                        ? "bg-neutral-900 border-red-600 text-red-100 animate-flyRight"
                                        : "bg-neutral-900 border-neutral-500 text-neutral-300 animate-flyLeft"
                                    )}
                            >
                                <div className="font-bold opacity-75 text-[9px] uppercase tracking-widest mb-1.5 border-b border-neutral-700 pb-0.5">
                                    {animatingMsg.role} ({isAttackerMsg(animatingMsg) ? 'Attacker' : 'Defender'})
                                </div>
                                <div className="line-clamp-4 font-mono leading-relaxed">
                                    "{animatingMsg.text}"
                                </div>
                            </div>
                        )}

                        {!animatingMsg && messages.length === 0 && (
                            <div className="absolute inset-0 flex items-center justify-center text-red-900/50 italic text-sm z-0 font-bold uppercase tracking-widest selection:bg-red-900/30">
                                Waiting for bloodshed...
                            </div>
                        )}
                        {!animatingMsg && messages.length > 0 && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-neutral-600 font-bold uppercase tracking-widest text-sm z-0">
                                <div>Awaiting next move</div>
                                <div className="flex space-x-1 mt-2">
                                    <div className="w-1.5 h-1.5 bg-red-700/50 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></div>
                                    <div className="w-1.5 h-1.5 bg-red-700/50 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></div>
                                    <div className="w-1.5 h-1.5 bg-red-700/50 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></div>
                                </div>
                            </div>
                        )}

                        {/* Agent 2 (Defender) */}
                        <div className="flex flex-col items-center z-10 w-24 mt-4">
                            <div className="text-6xl mb-2 drop-shadow-[0_0_15px_rgba(115,115,115,0.4)] hover:scale-110 transition-transform duration-300">{getModelIcon(agent2)}</div>
                            <div className="text-[10px] font-black text-neutral-400 bg-neutral-900/80 px-2 py-1 rounded border border-neutral-600/50 uppercase tracking-widest w-full text-center truncate">{agent2 || "Agent 2"}</div>
                        </div>
                    </div>

                    <div className="p-3 bg-neutral-950 border-t border-red-900/80 z-30">
                        <div className="flex justify-between items-center mb-1.5">
                            <span className="text-[10px] text-red-500/70 uppercase font-black tracking-widest">Attacker Resources</span>
                            <span className={"text-xs font-mono font-bold " + (resources > 30 ? "text-red-500" : "text-red-600 animate-pulse")}>{Math.round(resources / 100)}%</span>
                        </div>
                        <div className="w-full bg-black rounded-sm h-2 border border-red-950 p-0.5">
                            <div
                                className={"h-full rounded-sm transition-all duration-700 ease-out " + (
                                    resources > 60 ? "bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.8)]" :
                                        resources > 25 ? "bg-orange-600 shadow-[0_0_10px_rgba(234,88,12,0.8)]" :
                                            "bg-red-800"
                                )}
                                style={{ width: resources / 100 + "%" }}
                            ></div>
                        </div>
                    </div>
                    <style>{`
                        @keyframes flyRight {
                            0% { left: 15%; opacity: 0; transform: translateY(-50%) scale(0.5); }
                            10% { opacity: 1; transform: translateY(-50%) scale(1); }
                            80% { left: 65%; opacity: 1; transform: translateY(-50%) scale(1); }
                            100% { left: 75%; opacity: 0; transform: translateY(-50%) scale(0.5); }
                        }
                        @keyframes flyLeft {
                            0% { right: 15%; opacity: 0; transform: translateY(-50%) scale(0.5); }
                            10% { opacity: 1; transform: translateY(-50%) scale(1); }
                            80% { right: 65%; opacity: 1; transform: translateY(-50%) scale(1); }
                            100% { right: 75%; opacity: 0; transform: translateY(-50%) scale(0.5); }
                        }
                        .animate-flyRight {
                            animation: flyRight 1.8s forwards ease-in-out;
                        }
                        .animate-flyLeft {
                            animation: flyLeft 1.8s forwards ease-in-out;
                        }
                    `}</style>
                </div>
            );
        };

        function App() {
            const [agent1, setAgent1] = useState("chatgpt");
            const [agent2, setAgent2] = useState("gemini");
            const [ollamaModels, setOllamaModels] = useState([]);
            const [geminiModels, setGeminiModels] = useState([]);
            const [agent1SubModel, setAgent1SubModel] = useState("");
            const [agent2SubModel, setAgent2SubModel] = useState("");
            const [gameMode, setGameMode] = useState("word_guessing");
            const [battleId, setBattleId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [gameState, setGameState] = useState("");
            const [finished, setFinished] = useState(false);
            const [winner, setWinner] = useState(null);
            const [loading, setLoading] = useState(false);
            const [autoPlay, setAutoPlay] = useState(false);
            const [resources, setResources] = useState(100);
            const [showLiveFeed, setShowLiveFeed] = useState(true);
            const [secretWord, setSecretWord] = useState("");
            const [customSecretWord, setCustomSecretWord] = useState("OBLIVION");
            const battleIdRef = useRef(null);
            useEffect(() => { battleIdRef.current = battleId; }, [battleId]);
            
            
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                const fetchOllamaModels = async () => {
                    try {
                        const res = await fetch("/api/ollama/models");
                        const data = await res.json();
                        setOllamaModels(data.models || []);
                        if (data.models && data.models.length > 0) {
                            setAgent1SubModel(data.models[0]);
                            setAgent2SubModel(data.models[0]);
                        }
                    } catch (err) {
                        console.error("Failed to fetch Ollama models", err);
                    }
                };
                fetchOllamaModels();

                const fetchGeminiModels = async () => {
                    try {
                        const res = await fetch("/api/gemini/models");
                        const data = await res.json();
                        setGeminiModels(data.models || []);
                    } catch (err) {
                        console.error("Failed to fetch Gemini models", err);
                    }
                };
                fetchGeminiModels();
            }, []);

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            useEffect(() => {
                if (agent1 === "gemini") {
                    if (geminiModels.length > 0 && !geminiModels.includes(agent1SubModel)) {
                        setAgent1SubModel(geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]));
                    }
                } else if (agent1 === "ollama") {
                    if (ollamaModels.length > 0 && !ollamaModels.includes(agent1SubModel)) {
                        setAgent1SubModel(ollamaModels[0]);
                    }
                }
            }, [agent1, geminiModels, ollamaModels]);

            useEffect(() => {
                if (agent2 === "gemini") {
                    if (geminiModels.length > 0 && !geminiModels.includes(agent2SubModel)) {
                        setAgent2SubModel(geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]));
                    }
                } else if (agent2 === "ollama") {
                    if (ollamaModels.length > 0 && !ollamaModels.includes(agent2SubModel)) {
                        setAgent2SubModel(ollamaModels[0]);
                    }
                }
            }, [agent2, geminiModels, ollamaModels]);

            useEffect(() => {
                let interval;
                if (autoPlay && battleId && !finished) {
                    interval = setInterval(() => {
                        takeTurn();
                    }, 2000);
                }
                return () => clearInterval(interval);
            }, [autoPlay, battleId, finished]);

            
            const resetUI = () => {
                setBattleId(null);
                setMessages([]);
                setGameState("");
                setFinished(false);
                setWinner(null);
                setResources(100);
                setSecretWord("");
                setAutoPlay(false);
                setLoading(false);
            };
    
            const startBattle = async () => {
                setLoading(true);

                setMessages([]);
                setGameState("");
                setFinished(false);
                setWinner(null);
                try {
                    const res = await fetch("/api/battle/start", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            attacker: agent1,
                            attackerSubModel: (agent1 === "ollama" || agent1 === "gemini") ? agent1SubModel : null,
                            defender: agent2,
                            defenderSubModel: (agent2 === "ollama" || agent2 === "gemini") ? agent2SubModel : null,
                            playMode: "ai_vs_ai",
                            gameMode: gameMode,
                            targetWord: gameMode === "word_guessing" ? (customSecretWord || "OBLIVION") : null
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Failed to start battle");
                    setBattleId(data.battleId);
                    if (data.secretWord) setSecretWord(data.secretWord);
                } catch (err) {
                    console.error("Error starting battle: ", err.message);
                }
                setLoading(false);
            };

            const stopBattle = async () => {
                if (!battleId) return;
                try {
                    const res = await fetch(`/api/battle/stop?battle_id=${battleId}`, {
                        method: "POST"
                    });
                    const data = await res.json();
                    if (data.status === "stopped" || res.ok) {
                        resetUI();
                    }
                } catch (err) {
                    console.error("Error stopping battle:", err);
                }
            };


            const takeTurn = async () => {
                if (!battleId || finished || loading) return;
                const currentBattleId = battleId;
                setLoading(true);

                try {
                    const res = await fetch(`/api/battle/turn?battle_id=${battleId}`, {
                        method: "POST"
                    });
                    const data = await res.json();
                    if (currentBattleId !== battleIdRef.current) return;
                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // For word guessing, we sometimes get both Attacker and Defender messages in one call.
                    // We'll show the Attacker's message immediately, then the Defender's after a short delay for realism.
                    if (gameMode === 'word_guessing' && data.messages.length > messages.length + 1) {
                        const allMessages = data.messages;
                        const attackerMessage = allMessages[allMessages.length - 2];
                        const defenderMessage = allMessages[allMessages.length - 1];

                        // 1. Show only up to Attacker's message
                        setMessages(allMessages.slice(0, -1));

                        // 2. Wait 800ms, then show Defender's response
                        setTimeout(() => {
                            setMessages(allMessages);
                            setGameState(data.state || "");
                            setFinished(data.finished);
                            setWinner(data.winner);
                            setResources(data.resources);
                            if (data.secretWord) setSecretWord(data.secretWord);
                        }, 800);
                    } else {
                        setMessages(data.messages || []);
                        setGameState(data.state || "");
                        setFinished(data.finished);
                        setWinner(data.winner);
                        setResources(data.resources);
                        if (data.secretWord) setSecretWord(data.secretWord);
                    }
                } catch (err) {
                    console.error("Error taking turn:", err);
                    setAutoPlay(false);
                }
                setLoading(false);
            };

            return (
                <div className="container mx-auto px-4 py-8 max-w-5xl">
                    <header className="mb-8 p-6 text-center relative border-4 border-red-900/50 rounded-xl bg-[#1e1a1a] shadow-[0_0_30px_rgba(220,38,38,0.2)]">
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                            <div className="w-64 h-32 bg-red-600 blur-[80px] rounded-full"></div>
                        </div>
                        <h1 className="text-5xl font-black mb-2 tracking-tighter drop-shadow-lg relative z-10 flex items-center justify-center gap-3">
                            <span className="text-red-700">⚔️</span> 
                            <span><span className="text-black">Model</span><span className="text-red-500">Pit</span></span>
                            <span className="text-red-700">⚔️</span>
                        </h1>
                        <p className="text-red-400/80 font-medium tracking-wide relative z-10">Only the strongest model survives.</p>
                    </header>



                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 relative z-10">
                        {/* Setup Panel */}
                        <div className="bg-neutral-900 border border-red-900/40 p-6 rounded-xl shadow-2xl h-fit">
                            <h2 className="text-xl font-black text-red-500 mb-4 border-b border-red-900/50 pb-2 uppercase tracking-wider">Battle Configuration</h2>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-red-400/80 mb-1 uppercase tracking-wider">Agent 1 (Attacker/X)</label>
                                    <select 
                                        value={agent1} 
                                        onChange={(e) => { setAgent1(e.target.value); resetUI(); }}
                                        disabled={battleId && !finished}
                                        className="w-full bg-black border border-red-900/50 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-600 text-red-100 placeholder-neutral-500"
                                    >
                                        {MODELS.map(m => <option key={m} value={m}>{m.toUpperCase()}</option>)}
                                    </select>
                                    {agent1 === 'ollama' && (
                                        <select 
                                            value={agent1SubModel} 
                                            onChange={(e) => { setAgent1SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {ollamaModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {ollamaModels.length === 0 && <option value="">No Ollama Models Found</option>}
                                        </select>
                                    )}
                                    {agent1 === 'gemini' && (
                                        <select 
                                            value={agent1SubModel || (geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]))} 
                                            onChange={(e) => { setAgent1SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-neutral-950 border border-red-900/30 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-red-600 text-red-200"
                                        >
                                            {geminiModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {geminiModels.length === 0 && <option value="">No Gemini Models Found</option>}
                                        </select>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-neutral-400 mb-1 uppercase tracking-wider">Agent 2 (Defender/O)</label>
                                    <select 
                                        value={agent2} 
                                        onChange={(e) => { setAgent2(e.target.value); resetUI(); }}
                                        disabled={battleId && !finished}
                                        className="w-full bg-black border border-neutral-700 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-neutral-500 text-neutral-200"
                                    >
                                        {MODELS.map(m => <option key={m} value={m}>{m.toUpperCase()}</option>)}
                                    </select>
                                    {agent2 === 'ollama' && (
                                        <select 
                                            value={agent2SubModel} 
                                            onChange={(e) => { setAgent2SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {ollamaModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {ollamaModels.length === 0 && <option value="">No Ollama Models Found</option>}
                                        </select>
                                    )}
                                    {agent2 === 'gemini' && (
                                        <select 
                                            value={agent2SubModel || (geminiModels.includes("gemini-3-flash-preview") ? "gemini-3-flash-preview" : (geminiModels.includes("gemini-2.0-flash") ? "gemini-2.0-flash" : geminiModels[0]))} 
                                            onChange={(e) => { setAgent2SubModel(e.target.value); resetUI(); }}
                                            disabled={battleId && !finished}
                                            className="w-full mt-2 bg-slate-600 border border-slate-500 rounded-md px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        >
                                            {geminiModels.map(m => <option key={m} value={m}>{m}</option>)}
                                            {geminiModels.length === 0 && <option value="">No Gemini Models Found</option>}
                                        </select>
                                    )}
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-red-500/70 mb-1 uppercase tracking-wider">Arena Type</label>
                                    <select 
                                        value={gameMode} 
                                        onChange={(e) => { setGameMode(e.target.value); resetUI(); }}
                                        disabled={battleId && !finished}
                                        className="w-full bg-black border border-red-900/50 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-600 font-bold"
                                    >
                                        {GAMES.map(g => <option key={g.id} value={g.id}>{g.name.toUpperCase()}</option>)}
                                    </select>
                                </div>
                                {gameMode === 'word_guessing' && (
                                    <div>
                                        <label className="block text-xs font-bold text-red-500/70 mb-1 uppercase tracking-wider">Secret Mission (Defending Word)</label>
                                        <input 
                                            type="text"
                                            value={customSecretWord}
                                            onChange={(e) => setCustomSecretWord(e.target.value.toUpperCase())}
                                            disabled={battleId && !finished}
                                            placeholder="Enter secret word..."
                                            className="w-full bg-black border border-red-900/50 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-600 font-mono text-sm text-red-400 placeholder-red-950 uppercase"
                                        />
                                    </div>
                                )}


                                <button
                                    onClick={startBattle}
                                    disabled={loading || (battleId && !finished)}
                                    className="w-full bg-red-700 hover:bg-red-600 disabled:bg-neutral-800 disabled:text-neutral-600 disabled:border-transparent border border-red-500 text-white font-black uppercase tracking-widest py-3 px-4 rounded-md transition duration-200 mt-4 shadow-[0_0_15px_rgba(220,38,38,0.4)] disabled:shadow-none"
                                >
                                    FIGHT!
                                </button>
                            </div>

                            {battleId && (
                                <div className="mt-8 space-y-4">
                                    <h3 className="text-xs font-black text-red-600/70 uppercase tracking-widest border-b border-red-900/30 pb-1">Arena Controls</h3>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={takeTurn}
                                            disabled={loading || finished}
                                            className="flex-1 bg-neutral-800 border border-red-900 hover:bg-red-950 hover:border-red-700 disabled:bg-neutral-900 disabled:border-neutral-800 disabled:text-neutral-600 text-red-400 font-bold uppercase tracking-wider py-2 px-2 rounded-md transition duration-200 text-xs"
                                        >
                                            Next Strike
                                        </button>
                                        <button
                                            onClick={() => setAutoPlay(!autoPlay)}
                                            className={`flex-1 font-bold uppercase tracking-wider text-xs border ${autoPlay ? 'bg-red-600 border-red-500 text-white shadow-[0_0_10px_rgba(220,38,38,0.6)]' : 'bg-neutral-800 border-red-900/60 text-red-500/80 hover:bg-neutral-700 hover:text-red-400'} py-2 px-2 rounded-md transition duration-200`}
                                        >
                                            {autoPlay ? 'Halt Auto' : 'Auto Brawl'}
                                        </button>

                                        <button 
                                            onClick={stopBattle}
                                            disabled={finished}
                                            className="flex-1 bg-red-950 border border-red-900 hover:bg-red-900/80 hover:text-white disabled:bg-neutral-900 disabled:border-neutral-800 disabled:text-neutral-600 text-red-300 font-bold uppercase tracking-wider py-2 px-2 rounded-md transition duration-200 text-xs"
                                        >
                                            Surrender
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Battle Area */}
                        <div className="lg:col-span-2 space-y-6">
                            {/* Game State Visualization */}
                            <div className="bg-neutral-900 border border-neutral-800 p-6 rounded-xl shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-900 via-red-600 to-red-900"></div>
                                <h2 className="text-xl font-black text-white mb-4 border-b border-neutral-800 pb-2 uppercase tracking-widest flex items-center gap-2">
                                    <span className="text-red-500">◆</span> Battle Screen <span className="text-red-500">◆</span>
                                </h2>
                                {gameMode === 'word_guessing' ? (
                                    <div className="flex flex-col items-center">
                                        <div className="mb-4 w-full">
                                            <WordGuessingArena messages={messages} resources={resources} secretWord={secretWord} agent1={agent1} agent2={agent2} />
                                        </div>
                                        {finished && (
                                            <div className="text-2xl font-bold text-yellow-400 animate-bounce">
                                                {winner === 'draw' ? 'DRAW!' : `WINNER: ${winner.toUpperCase()}!`}
                                            </div>
                                        )}
                                    </div>
                                ) : gameState ? (
                                    <div className="flex flex-col items-center">
                                        <div className="mb-4 w-full">
                                            {gameMode === 'tictactoe' && <TicTacToeBoard state={gameState} finished={finished} winner={winner} />}
                                            {gameMode === 'rockpapsci' && <RockPaperScissorsBoard state={gameState} />}
                                            {(!['tictactoe', 'rockpapsci', 'word_guessing'].includes(gameMode)) && (
                                                <div className="game-board text-center">{gameState}</div>
                                            )}
                                        </div>
                                        {finished && (
                                            <div className="text-2xl font-black mt-6 tracking-widest uppercase text-red-500 animate-pulse drop-shadow-[0_0_10px_rgba(220,38,38,0.8)] border border-red-500/50 bg-red-950/50 px-6 py-2 rounded-lg">
                                                {winner === 'draw' ? 'BLOODY DRAW!' : `${winner} DOMINATES!`}
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="h-48 flex items-center justify-center text-red-900 text-xl font-black uppercase tracking-[0.3em] opacity-30">
                                        Arena Empty
                                    </div>
                                )}
                            </div>

                            {/* Live Feed */}
                            <div className="bg-neutral-900 border border-neutral-800 p-6 rounded-xl shadow-2xl flex flex-col relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-16 h-16 bg-red-900/10 rounded-bl-full pointer-events-none"></div>
                                <div
                                    className="flex justify-between items-center mb-4 border-b border-neutral-800 pb-2 cursor-pointer hover:bg-red-950/20 transition-colors p-2 rounded-t-lg -mx-2 -mt-2 group"
                                    onClick={() => setShowLiveFeed(!showLiveFeed)}
                                >
                                    <h2 className="text-xl font-black text-neutral-300 uppercase tracking-wider group-hover:text-red-400 transition-colors">Combat Log {messages.length > 0 && <span className="text-red-600 text-sm ml-2">[{messages.length}]</span>}</h2>
                                    <span className="text-red-800/60 text-xs font-bold uppercase tracking-widest group-hover:text-red-500 transition-colors">
                                        {showLiveFeed ? '▼ Hide' : '▶ Reveal'}
                                    </span>
                                </div>
                                {showLiveFeed && (
                                    <div className="message-feed space-y-4 pr-2">
                                        {messages.length === 0 && (
                                            <div className="text-neutral-700 font-bold uppercase tracking-widest text-xs text-center py-12">Silence...</div>
                                        )}
                                        {messages.map((msg, idx) => (
                                            <div key={idx} className={`p-4 rounded-md border-y border-r border-transparent ${msg.role.includes('1') || msg.role === 'attacker' ? 'bg-red-950/20 ml-0 mr-8 border-l-4 border-l-red-600 hover:bg-red-950/40' : 'bg-neutral-800/30 ml-8 mr-0 border-r-4 border-r-neutral-500 hover:bg-neutral-800/50 text-right'} transition-colors`}>
                                                <div className="text-[10px] font-black text-red-500/70 uppercase mb-1 tracking-widest">{msg.role}</div>
                                                <div className="text-sm mb-2 text-neutral-200">{msg.text}</div>
                                                {msg.analysis && (
                                                    <details className="mt-3 group/details">
                                                        <summary className="text-[9px] cursor-pointer text-neutral-600 group-hover/details:text-red-400 uppercase tracking-widest font-bold w-fit">Thought Process</summary>
                                                        <div className="text-[11px] mt-2 text-red-200/60 font-mono bg-black p-3 rounded border border-red-900/30">
                                                            {msg.analysis}
                                                        </div>
                                                    </details>
                                                )}
                                            </div>
                                        ))}
                                        <div ref={messagesEndRef} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
